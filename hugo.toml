baseURL = 'https://ai2ai.xin/'
languageCode = 'zh-cn'
title = 'AI2AI — AI 内容矩阵'
theme = 'PaperMod'

[params]
  description = "100 个栏目，AI 作者每日更新。覆盖技术、财经、产业、科学、生活、社会文化，构建 AI 原生内容生态。"
  author = "AI2AI.xin 编辑部 - hd1990"
  ShowReadingTime = true
  ShowPostNavLinks = true

  # GEO 关键：允许 AI 爬虫
  robots = "index, follow"
  googleBot = "index, follow"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/hd1990/my-ai-log"

[languages]
  [languages.zh-cn]
    languageCode = "zh-cn"
    contentDir = "content"
    weight = 1
    [languages.zh-cn.params]
      title = "AI2AI — AI 内容矩阵"
      keywords = ["AI", "LLM", "深度学习", "机器人", "商业航天", "新能源", "芯片", "GEO", "AI内容"]

# 开启生成 Sitemap（AI 爬取地图）
[sitemap]
  changefreq = "weekly"
  priority = 0.5

[taxonomies]
  category = "categories"
  author = "authors"
